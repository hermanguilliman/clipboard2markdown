<!DOCTYPE html>
<html lang="ru" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <title>Скопипасти в markdown</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Doto:wght@400..700&family=Space+Grotesk:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicon/favicon-16x16.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="favicon/favicon-32x32.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicon/apple-touch-icon.png"
    />
    <link rel="icon" sizes="192x192" href="favicon/android-chrome-192x192.png" />
    <link rel="icon" sizes="512x512" href="favicon/512.png" />
    <link rel="shortcut icon" href="favicon/favicon.png" type="image/x-icon" />
    <link rel="manifest" href="/manifest.json" />
    <meta
      name="description"
      content="Преобразуйте форматированный текст в язык markdown. Просто вставьте текст и наш конвертер быстро преобразует его в markdown."
    />
  </head>
  <body>
    <div class="nd-app">
      <header class="nd-header">
        <h1 class="nd-display">СКОПИПАСТИ В&nbsp;MARKDOWN</h1>
        <button id="theme-toggle" aria-label="Сменить тему">☾</button>
      </header>

      <div class="nd-card" id="card">
        <div class="nd-paste-hint" id="paste-hint">
          <span class="nd-paste-hint-text"
            ><kbd id="cmd-key">CMD</kbd>+<kbd>V</kbd> или перетащите
            HTML-файл</span
          >
        </div>

        <textarea
          id="markdown"
          class="nd-output"
          spellcheck="false"
        ></textarea>

        <div class="nd-toolbar">
          <div class="nd-toolbar-left">
            <a class="nd-tag" href="/?cleanup=no" id="cleanup-toggle"
              >ОЧИСТКА: ВКЛ</a
            >
            <span class="nd-tag" id="settings-btn">НАСТРОЙКИ</span>
          </div>
          <button id="copy-btn" class="nd-btn-primary" disabled>
            КОПИРОВАТЬ
          </button>
        </div>

        <details id="settings-panel" class="nd-settings">
          <summary>ПАРАМЕТРЫ КОНВЕРТАЦИИ</summary>
          <div class="nd-settings-row">
            <label
              >ЗАГОЛОВКИ
              <select id="setting-headingStyle">
                <option value="atx">## ATX</option>
                <option value="setext">=== Setext</option>
              </select>
            </label>
            <label
              >МАРКЕР
              <select id="setting-bulletListMarker">
                <option value="-">-</option>
                <option value="*">*</option>
                <option value="+">+</option>
              </select>
            </label>
            <label
              >КУРСИВ
              <select id="setting-emDelimiter">
                <option value="_">_текст_</option>
                <option value="*">*текст*</option>
              </select>
            </label>
            <label
              >ЖИРНЫЙ
              <select id="setting-strongDelimiter">
                <option value="**">**текст**</option>
                <option value="__">__текст__</option>
              </select>
            </label>
            <label
              >КОД
              <select id="setting-codeBlockStyle">
                <option value="fenced">```</option>
                <option value="indented">4 ПРОБЕЛА</option>
              </select>
            </label>
          </div>
        </details>

        <details id="history-panel" class="nd-history">
          <summary>ИСТОРИЯ <span id="history-count"></span></summary>
          <div id="history-list" class="nd-history-list"></div>
          <div id="history-warning" class="nd-history-warning"></div>
        </details>
      </div>
    </div>

    <div id="paste" contenteditable="true" spellcheck="false"></div>

    <script>
      (() => {
        const search = new URLSearchParams(location.search);
        const toggle = document.getElementById("cleanup-toggle");
        if (search.get("cleanup") === "no" && toggle) {
          search.set("cleanup", "yes");
          toggle.href = "/?" + search.toString();
          toggle.textContent = "ОЧИСТКА: ВЫКЛ";
        }
      })();
    </script>
  </body>

  <script src="dist/app.js"></script>
</html>
